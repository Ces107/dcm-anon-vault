app = "dcm-anon-vault"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  DCM_DB_URL = "sqlite:////data/vault.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "vault_data"
  destination = "/data"
  initial_size = "1gb"
